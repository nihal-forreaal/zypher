<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zypher Com | Next-Gen Solutions</title>
    <meta name="description" content="Experience the future of digital solutions with Zypher Com.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-mesh"></div>
    <header class="glass-nav">
        <div class="logo">Zypher.</div>
        <nav>
            <ul class="nav-links">
                <li><a href="#features">Features</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
        <button class="cta-button">Get Started</button>
    </header>

    <main class="hero-section">
        <div class="hero-content">
            <h1 class="hero-title">Elevate Your Reality with <span class="gradient-text">Zypher</span></h1>
            <p class="hero-subtitle">We build dynamic, forward-thinking web experiences that blend art and technology.</p>
            <div class="hero-actions">
                <button class="primary-button">Explore Services</button>
                <button class="secondary-button">Watch Demo</button>
            </div>
        </div>
        <div class="hero-visual">
            <div class="floating-orb orb-1"></div>
            <div class="floating-orb orb-2"></div>
            <div class="glass-card main-card">
                <h3>System Status</h3>
                <div class="status-indicator">
                    <span class="pulse-dot"></span> Online and Ready
                </div>
                <div class="data-bar"></div>
                <div class="data-bar short"></div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
